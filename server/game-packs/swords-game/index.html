<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#050607">
  <title>Swords Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="game" aria-label="Swords Game"></canvas>
  <div id="hud">
    <b id="roomLabel">SOLO</b><span id="levelLabel">LEVEL 1</span><span id="score">0 / 8</span><span id="hearts"></span>
  </div>
  <div id="roundInfo" class="hidden"><strong>ROUND OVER</strong><span>Next round in 5</span></div>
  <div class="joystick-wrap left-stick-wrap"><span>MOVE + JUMP</span><div class="joystick" data-stick="move"><i></i></div></div>
  <div class="joystick-wrap right-stick-wrap"><span>SWORD</span><div class="joystick sword" data-stick="sword"><i></i></div></div>
  <div id="message">
    <strong>SWORDS GAME</strong>
    <span id="mapDesc">Seven battle maps · three levels each · up to six players</span>
    <div id="mapPreview"><div id="previewImage"></div><button id="mapPrev" type="button">◀</button><div><b id="mapName">Moon Alley</b><small id="mapLevelInfo">LEVELS 1–3</small></div><button id="mapNext" type="button">▶</button></div>
    <div id="joinPanel">
      <input id="playerName" maxlength="24" autocomplete="off" aria-label="Player name" value="Swordsman">
      <div class="joinButtons"><button id="solo">SOLO</button><button id="quick">QUICK MATCH</button><button id="create">CREATE ROOM</button></div>
      <div class="codeRow"><input id="roomCode" maxlength="3" placeholder="ABC" aria-label="3-letter room code"><button id="join">JOIN</button></div>
      <small id="status">Choose solo or multiplayer</small>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
